<div class="container mt-4">
    <br><br><br>
    <div class="container">
        <table class="table" id="excel-table">
            <thead>
                <tr>
                    <th>Sr No.</th>
                    <th>Work Order No</th>
                    <th>Client Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let a of WorkOrder | paginate :{itemsPerPage :20 ,currentPage:pro}, let i = index">
                    <td>{{a.Workorder_Id}}</td>
                    <td>
                        <p title="View Quotation Details"><a href=""
                                [routerLink]="['/AdminDashboard/WorkorderDetails', a.Workorder_Id]">{{a.WO_Number}}</a>
                        </p>
                    </td>

                    <td>{{a.Client_Name}}</td>
                    <!-- <td>
                        <p class="">
                            <a type="button" (click)="editRequirement(a.Req_id)" data-bs-toggle="modal"
                                data-bs-target="#exampleModal1" title="Edit a Requirement">
                                <i class="fa-solid fa-pen-to-square fa-lg"></i>
                            </a>
                            <span style="margin-left: 5%;">
                                <a type="button" (click)="DeleteRequirement(a.Req_id)" title="Delete a Requirement">
                                    <i class="fa-solid fa-trash-can"></i>
                                </a>
                            </span>
                        </p>
                    </td> -->
                </tr>
            </tbody>
        </table>
    </div>

    <h3 class="text-center mb-4">Create Work Order</h3>

    <form [formGroup]="AddWorkorderform" (ngSubmit)="submitworkorder()">

        <!-- ================= Requirement & Client ================= -->
        <div class="row">
            <div class="col-md-4">
                <label>Requirement ID</label>
                <!-- <select formControlName="Req_id" class="Se">
                            <option *ngFor="let mat of AllRequirementData" [value]="mat.Req_id">
                                {{mat.Req_id}}</option>
                        </select> <br> -->
                <select class="form-control" formControlName="Req_id"
                    (change)="onRequirementSelect($any($event.target).value)">
                    <option value="">-- Select Requirement --</option>
                    <option *ngFor="let r of AllRequirementData" [value]="r.Req_id">
                        {{ r.Req_id }}
                    </option>
                </select>
            </div>

            <div class="col-md-4">
                <label>Client Name</label>
                <input class="form-control" formControlName="Client_Name" readonly>
            </div>

            <div class="col-md-4">
                <label>Requirement Number</label>
                <input class="form-control" formControlName="Requirement_No" readonly>
            </div>

        </div>

        <hr>

        <!-- ================= Products ================= -->
        <h5 class="mt-3">Products</h5>

        <div formArrayName="items">
            <table class="table table-bordered" *ngIf="items.length">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Material</th>
                        <!-- <th> Design_File</th>
                        <th> PDFDesignfile</th> -->
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let item of items.controls; let i=index" [formGroupName]="i">

                        <!-- AUTO FILLED -->
                        <td>{{ item.get('Product_Name')?.value }}</td>
                        <td>{{ item.get('Product_Quantity')?.value }}</td>
                        <td>{{ item.get('Material_Type')?.value }}</td>
                        <!-- <td>{{ item.get('Design_File')?.value }}</td>
                        <td>{{ item.get('PDFDesignfile')?.value }}</td> -->

                    </tr>
                </tbody>
            </table>
        </div>

        <hr>

        <!-- ================= Other Details ================= -->
        <div class="row">
            <!-- <div class="col-md-4">
                <label>Payment Term</label>
                <input class="form-control" formControlName="Payment_term">
            </div> -->

            <div class="col-md-4">
                <label>Manager Name </label>
                <br>
                <select class="form-control" formControlName="Manager_Name" class="">
                    <option value="">-- Select Manager Name --</option>
                    <option *ngFor="let mat of AllManagerdata" [value]="mat.Name">{{mat.Name}}
                    </option>
                </select> <br>
            </div>

            <div class="col-md-4">
                <label>Engineer Name</label>
                 <br>
                <select class="form-control" formControlName="Engineer_Name" class="">
                    <option value="">-- Select Engineer Name --</option>
                    <option *ngFor="let mat of AllEngineerdata" [value]="mat.Name">{{mat.Name}}
                    </option>
                </select> <br>

            </div>

            <div class="col-md-4">
                <label>QC Name</label>
                 <br>
                <select class="form-control" formControlName="QC_Name" class="">
                    <option value="">-- Select QC Name --</option>
                    <option *ngFor="let mat of AllQCdata" [value]="mat.Name">{{mat.Name}}
                    </option>
                </select> <br>
            </div>

            <div class="col-md-4">
                <label>Dispatch Manager Name</label> 
                <br>
                <select class="form-control" formControlName="DispatchManager_Name" class="">
                    <option value="">-- Select Dispatch Manager Name --</option>
                    <option *ngFor="let mat of AllDispatchManagerdata" [value]="mat.Name">{{mat.Name}}
                    </option>
                </select> <br>
            </div>

            <div class="col-md-4">
                <label>Due Date</label>
                <input type="date" class="form-control" formControlName="Due_Date">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-4">
                <label>Status</label>
                <select class="form-control" formControlName="WorkOrder_Status">
                    <option value="Create">Create</option>
                    <option value="Sent">Sent</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
        </div>

        <!-- ================= Submit ================= -->
        <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary px-5">
                Create Work Order
            </button>
        </div>
    </form>
    
    <!-- Debug -->
    <!-- <pre class="mt-3">{{ AddQuotationform.value | json }}</pre> -->
    <!-- <pre class="mt-3">{{Quotations | json }}</pre> -->
</div>
<br> <br>
